    scope: |
      Terraform/IaC definitions for IAM across entire BDI ecosystem:
      - Supabase: RLS policies, 6 canonical roles, 12 domains
      - GCP: IAM bindings, service account permissions, secret access policies
      - Cloudflare: Access policies, service tokens
      - GitHub: org roles, repo permissions, Actions secrets access
      - n8n: API key scopes
      - Vercel: team/project access
      Co-designed with Console backlog ADM-001 (role + domain tags system).
    backlog_overlap:
      - ADM-001  # Role + Domain Tags przebudowa (P0, 6 roles + 12 domains)
      - ADM-004  # User Management UI
      - ADM-011  # Solution ACL + RACI computed model
      - ADM-012  # Konta Adam + Olga
      - LOG-005  # RLS na lab_audit_log
      - CROSS-004  # Agent MCP scope & guardrails
      - CROSS-016  # Security Model + RLS Manifest
    iam_model:
      roles:
        - super_admin
        - admin
        - editor
        - contributor
        - viewer
        - agent
      domains:
        - business       # Strategia, model biznesowy, pricing, GTM
        - product        # Product management, roadmapa, backlog, fazy PLC
        - operations     # Procesy operacyjne, SOP, workflow'y, n8n
        - architecture   # Architektura systemów, integracje, tech decisions
        - security       # Cyberbezpieczeństwo, sekrety, access policies, audyt
        - tech_stack     # Stack technologiczny, frameworki, biblioteki, wersje
        - devops         # CI/CD, deploymenty, infrastruktura, Terraform
        - testing        # QA, testy E2E, contract tests, quality gates
        - compliance     # Regulacje, AI Act, NIS2, RODO, certyfikacje
        - monitoring     # Observability, logi, metryki, alerty, Sentry
        - external       # Relacje z klientami, partnerzy, dostawcy
        - feedback       # Customer feedback, NPS, user research, ankiety
      seed_users:
        - email: krzysztof@baltic-digital.org
          roles: [super_admin]
          domains: null  # null = all domains
        - email: it@baltic-digital.org
          name: Adam
          roles: [admin, editor]
          domains: [compliance, monitoring, architecture, security, tech_stack, testing, devops]
        - email: olga@baltic-digital.org
          name: Olga
          roles: [editor]
          domains: [business, product, operations, testing]
    depends_on:
      - W8.01  # Secrets inform IAM (secret access policies reference existing secrets)
    deliverables:
      - L1_INFRASTRUCTURE/gcp/iam/iam.tf (template, pending gcloud discovery)
      - L1_INFRASTRUCTURE/gcp/iam/discover-iam.sh (GCP IAM discovery script)
      - L1_INFRASTRUCTURE/supabase/migrations/20260409_001_fix_is_admin_add_super_admin.sql
      - L1_INFRASTRUCTURE/supabase/migrations/20260409_002_lab_access_domains.sql
      - L1_INFRASTRUCTURE/supabase/migrations/20260409_003_lab_user_domain_access.sql
      - L1_INFRASTRUCTURE/supabase/migrations/20260409_004_seed_users_adam_olga.sql
    discovery_findings:
