        status: ACCEPTED
        date: "2026-04-09"
      - decision: "GitHub Actions (no OPA, no Spacelift)"
        status: ACCEPTED
        date: "2026-04-09"
      - decision: "12 DAG access domains coexist with 11 data domains"
        status: ACCEPTED
        date: "2026-04-09"
    kr_hitl_required:
      - "Run discover-iam.sh on machine with gcloud access"
      - "Apply SQL migrations to Supabase (via Supabase CLI or MCP)"
    depends_on:
