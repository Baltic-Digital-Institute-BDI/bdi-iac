# Sync Google OAuth client_secret from GCP Secret Manager → Supabase Auth config
# Use case: TEST env google_secret stale/invalid → causes oauth2 "invalid_client" 500 error
# Strategy: GCP_SA_KEY_TERRAFORM reads prod-eka-google-oauth-client-secret from GCP SM → PATCH Supabase

name: "Sync Google OAuth Secret"

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, test, prod, all]
      gcp_secret_name:
        description: "GCP Secret Manager secret name (default: shared OAuth)"
        required: true
        default: "prod-eka-google-oauth-client-secret"

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    name: "Sync OAuth secret"
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_TERRAFORM }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pull google_secret from GCP Secret Manager
        id: pull
        run: |
          SECRET=$(gcloud secrets versions access latest --secret="${{ inputs.gcp_secret_name }}" 2>/dev/null || echo "FAILED")
          if [ "$SECRET" = "FAILED" ] || [ -z "$SECRET" ]; then
            echo "::error::Failed to pull secret ${{ inputs.gcp_secret_name }} from GCP SM"
            # Try alternative names
            for ALT in "eka-google-oauth-client-secret" "eka-google-secret" "google-oauth-secret" "prod-google-oauth-secret"; do
              echo "Trying $ALT..."
              ALT_VAL=$(gcloud secrets versions access latest --secret="$ALT" 2>/dev/null || echo "")
              if [ -n "$ALT_VAL" ]; then
                SECRET="$ALT_VAL"
                echo "Found in $ALT"
                break
              fi
            done
          fi
          [ -z "$SECRET" ] && { echo "::error::No secret found"; exit 1; }
          # Mask + persist for next steps
          echo "::add-mask::$SECRET"
          echo "secret_value=$SECRET" >> $GITHUB_OUTPUT
          echo "Secret pulled (length: ${#SECRET})"

      - name: PATCH Supabase Auth config(s)
        env:
          SBP: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GOOGLE_SECRET: ${{ steps.pull.outputs.secret_value }}
        run: |
          declare -A REFS=( [dev]=jiffxoseckvwlnskbuyk [test]=adsdaehvvnwknjushshn [prod]=vpbbguexygbqovsjfsab )
          
          if [ "${{ inputs.env }}" = "all" ]; then
            TARGETS="dev test prod"
          else
            TARGETS="${{ inputs.env }}"
          fi
          
          for ENV in $TARGETS; do
            REF=${REFS[$ENV]}
            echo "=== Patching $ENV ($REF) ==="
            PAYLOAD=$(jq -n --arg s "$GOOGLE_SECRET" '{external_google_secret: $s, external_google_enabled: true}')
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer $SBP" \
              -H "Content-Type: application/json" \
              "https://api.supabase.com/v1/projects/$REF/config/auth" \
              -d "$PAYLOAD" | jq -r '"  external_google_enabled: " + (.external_google_enabled|tostring) + "  · external_google_client_id: " + (.external_google_client_id // "?" | .[0:30] + "...")'
            echo "  ✅ Patched"
          done
