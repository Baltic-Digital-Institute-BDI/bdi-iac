# HIGH-014 W8.04 IaC Governance — Apply Pipeline (main branch only)
# Runs terraform apply ONLY after PR merge to main + manual approval
# Decision ref: HIGH-014 Decision Document, Decision 2 (KR: TAK)

name: "Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - "L1_INFRASTRUCTURE/**/*.tf"
      - "L1_INFRASTRUCTURE/**/*.tfvars"

permissions:
  contents: read

env:
  TF_VERSION: "1.5.7"
  TF_IN_AUTOMATION: "true"

jobs:
  apply:
    name: "TF Apply"
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub Settings → Environments
    strategy:
      matrix:
        module:
          - L1_INFRASTRUCTURE/gcp/secrets
          - L1_INFRASTRUCTURE/gcp/iam
          - L1_INFRASTRUCTURE/cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_TERRAFORM }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ matrix.module }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ matrix.module }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Post-apply Verification
        run: |
          echo "▶ Running post-apply drift check..."
          terraform plan -detailed-exitcode -input=false 2>&1 || {
            EXITCODE=$?
            if [ $EXITCODE -eq 2 ]; then
              echo "⚠️ WARNING: Drift detected after apply!"
              exit 1
            fi
          }
          echo "✅ Zero drift confirmed"
        working-directory: ${{ matrix.module }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
