name: secrets_api_keys_detector
category: secrets
severity: CRITICAL
description: |
  Detects exposed API keys for Anthropic (sk-ant-*), Google (AIza*), AWS (AKIA*),
  OpenAI (sk-*), Stripe (sk_live_*), and similar provider-prefixed credentials in
  source materials. Includes entropy-based heuristic (≥4.0 Shannon) to reduce
  false positives on documentation placeholders.
pattern_examples:
  - "ANTHROPIC_API_KEY=sk-ant-api03-<REDACTED_LIKE_STRING>"
  - "GOOGLE_API_KEY: AIza<REDACTED_35_CHARS>"
  - "aws_access_key_id = AKIA<REDACTED_16_CHARS>"
  - "OPENAI_API_KEY='sk-<REDACTED_48_CHARS>'"
  - "STRIPE_SECRET=sk_live_<REDACTED_24_CHARS>"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for exposed provider API keys.
  Provider patterns include:
  - Anthropic: prefix `sk-ant-` followed by ≥20 base62 characters
  - Google Cloud: prefix `AIza` followed by 35 base62/dash/underscore characters
  - AWS access key: prefix `AKIA` followed by 16 uppercase alphanumerics
  - OpenAI: prefix `sk-` followed by ≥40 base62 characters (NOT `sk-ant-`)
  - Stripe: prefix `sk_live_` or `sk_test_` followed by ≥24 base62 characters

  Compute Shannon entropy on the candidate substring. Treat documentation
  placeholders (text containing `XXXX`, `REDACTED`, `<...>`, `your_key_here`,
  `example`, `placeholder`) as NEGATIVE evidence — they MUST NOT trigger detection.

  Return JSON matching expected_output_schema. In `evidence`, ALWAYS replace
  the matched secret value with the literal token `<REDACTED_API_KEY>`. NEVER
  echo the full live secret back. NEVER repeat any base62 payload longer than
  6 consecutive characters.

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string         # redacted excerpt (max 80 chars · raw key replaced with <REDACTED_API_KEY>)
      provider: string        # anthropic | google | aws | openai | stripe | other
      entropy: float          # Shannon entropy of candidate substring
      position: string        # "line:col" or "byte_offset"
      confidence: float       # 0.0-1.0 (entropy ≥ 4.0 + provider prefix match = 0.95+)
  sensitivity: L4_RESTRICTED
  recommended_action:
    - "STOP-4 immediate escalation to Shield A5"
    - "Rotate credential at provider console"
    - "Audit commit history / Slack / Drive for additional exposure"
    - "Replace in code with vault-backed reference"
