name: secrets_db_credentials_detector
category: secrets
severity: CRITICAL
description: |
  Detects exposed database connection strings and inline passwords for PostgreSQL,
  MySQL, MongoDB, Redis, MSSQL, and generic JDBC/DSN formats. Distinguishes
  development/example credentials (e.g. `changeme`, `password`) from production
  candidates via entropy + context inspection.
pattern_examples:
  - "DATABASE_URL=postgres://app_user:<REDACTED_PASSWORD>@db.example.com:5432/prod"
  - "MYSQL_PASSWORD=<REDACTED>"
  - "mongodb+srv://admin:<REDACTED>@cluster0.mongodb.net/"
  - "jdbc:sqlserver://srv:1433;user=sa;password=<REDACTED>"
  - "redis://:<REDACTED>@cache.internal:6379/0"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for exposed database
  credentials embedded in connection strings or assignment expressions.

  Patterns to detect:
  - Postgres URI: `postgres(?:ql)?://<user>:<password>@<host>:<port>/<db>`
  - MySQL URI: `mysql://<user>:<password>@...`
  - MongoDB SRV: `mongodb(?:\+srv)?://<user>:<password>@...`
  - Redis URI with password segment after `:`
  - MSSQL JDBC: `jdbc:sqlserver://...password=<value>`
  - Env-var inline: `(DB|MYSQL|POSTGRES|MONGO|REDIS)_PASSWORD\s*=\s*<value>`

  Treat password values that are clearly placeholders (`changeme`, `password`,
  `secret`, `example`, `<...>`, `${VAR}`, `$VAR`, contains only `*` or `x`)
  as NEGATIVE evidence — they MUST NOT trigger detection.

  Treat passwords with Shannon entropy ≥3.5 OR length ≥16 mixed-case-symbol
  as PRODUCTION CANDIDATES.

  Return JSON matching expected_output_schema. Replace the password value in
  `evidence` with `<REDACTED_DB_PASSWORD>`. NEVER echo the password back.

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string                 # redacted (password → <REDACTED_DB_PASSWORD>)
      provider_hint: string           # postgres | mysql | mongo | redis | mssql | unknown
      production_candidate: bool      # true if entropy ≥3.5 or length ≥16 mixed
      host_hint: string               # redacted host or 'localhost' or 'unknown'
      confidence: float
  sensitivity: L4_RESTRICTED
  recommended_action:
    - "STOP-4 · rotate DB password at provider (Supabase / cloud console)"
    - "Audit query logs for unauthorized access during exposure window"
    - "Move credential to GCP Secret Manager / Supabase Vault"
    - "Update application to use vault-backed reference"
