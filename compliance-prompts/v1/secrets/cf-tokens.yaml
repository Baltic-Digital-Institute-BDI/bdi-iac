name: secrets_cf_tokens_detector
category: secrets
severity: CRITICAL
description: |
  Detects exposed Cloudflare credentials including Account API Tokens (typically
  40-char base62), Global API Keys (37-char hex via X-Auth-Key header), and
  Access Service Tokens (UUID-format Client ID + Client Secret pair). Critical
  blast radius — CF tokens often have edge/account-wide DNS + Workers modify
  capability.
pattern_examples:
  - "CLOUDFLARE_API_TOKEN=<REDACTED_40_CHARS>"
  - "X-Auth-Email: admin@example.com\nX-Auth-Key: <REDACTED_37_HEX>"
  - "CF_ACCESS_CLIENT_ID=<REDACTED>.access\nCF_ACCESS_CLIENT_SECRET=<REDACTED>"
  - "cf_access_client_secret_<role>=<REDACTED_64_CHARS>"
  - "Authorization: Bearer cf-<REDACTED_TOKEN>"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for exposed Cloudflare
  credentials.

  Token classes:
  - Account API Token: 40-character base62 string typically passed as
    `Authorization: Bearer <token>` against `api.cloudflare.com` endpoints
  - Global API Key: 37-character hex string passed via header
    `X-Auth-Key: <key>` paired with `X-Auth-Email`
  - Access Service Token Client ID: UUID-style ending in `.access` (or
    explicit env var `CF_ACCESS_CLIENT_ID`)
  - Access Service Token Client Secret: 64-character base62 string (env var
    `CF_ACCESS_CLIENT_SECRET` or labels containing `cf_access_client_secret_*`)

  Treat values inside `<...>`, containing `EXAMPLE`, `REDACTED`, `YOUR_`,
  `paste your`, or being all asterisks/X as NEGATIVE — placeholders MUST NOT
  trigger detection.

  Return JSON matching expected_output_schema. Replace the token value in
  `evidence` with `<REDACTED_CF_TOKEN>`. NEVER echo the live token back.

  Pair detection: if BOTH `CF_ACCESS_CLIENT_ID` AND `CF_ACCESS_CLIENT_SECRET`
  appear within the same fragment, classify `token_class=access_service_pair`
  and bump confidence (paired exposure = full M2M auth compromise).

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string                # redacted (token → <REDACTED_CF_TOKEN>)
      token_class: string            # api_token | global_api_key | access_service_pair | access_service_secret_only
      paired_exposure: bool          # true if both ID + secret detected in same fragment
      position: string
      confidence: float
  sensitivity: L4_RESTRICTED
  recommended_action:
    - "STOP-4 · rotate token at https://dash.cloudflare.com/profile/api-tokens"
    - "For Access Service Token pairs: rotate Client Secret in CF Zero Trust dashboard"
    - "Audit Cloudflare Audit Log for token usage during exposure window"
    - "Update GCP Secret Manager + Supabase Vault references downstream"
