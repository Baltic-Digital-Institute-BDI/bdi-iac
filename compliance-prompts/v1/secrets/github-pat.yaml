name: secrets_github_pat_detector
category: secrets
severity: CRITICAL
description: |
  Detects exposed GitHub Personal Access Tokens including classic PATs (ghp_*),
  fine-grained PATs (github_pat_*), OAuth tokens (gho_*), and server-to-server
  tokens (ghs_*). Critical risk class — single token can grant org-wide repo
  + workflow + Actions modification capability if scope is broad.
pattern_examples:
  - "GH_TOKEN=ghp_<REDACTED_36_CHARS>"
  - "github_pat_<REDACTED_82_CHARS>"
  - "Authorization: token ghs_<REDACTED_36_CHARS>"
  - "GITHUB_OAUTH=gho_<REDACTED_36_CHARS>"
  - "deploy_token: ghu_<REDACTED_36_CHARS>"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for exposed GitHub
  Personal Access Tokens and related token families.

  Token classes to detect:
  - Classic PAT: prefix `ghp_` followed by 36 base62 characters
  - Fine-grained PAT: prefix `github_pat_` followed by ≥82 mixed alphanumerics + underscores
  - OAuth app token: prefix `gho_` followed by 36 base62 characters
  - User-to-server installation: prefix `ghu_` or `ghs_` followed by 36 base62 characters

  Treat anything wrapped in `<...>`, containing `XXX` repetitions ≥4, ending
  with `_HERE`, or labeled `placeholder`/`example`/`docs` as NEGATIVE — these
  MUST NOT trigger detection.

  Return JSON matching expected_output_schema. Replace the token value in
  `evidence` with `<REDACTED_GH_TOKEN>`. NEVER echo the live token back.

  If detected: include `token_class` (classic_pat | fine_grained_pat | oauth |
  user_to_server) to drive rotation playbook selection. Fine-grained PATs are
  highest priority (longest-lived AND most scoped).

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string                # redacted (token → <REDACTED_GH_TOKEN>)
      token_class: string            # classic_pat | fine_grained_pat | oauth | user_to_server
      length: int                    # raw token length (no payload)
      position: string
      confidence: float
  sensitivity: L4_RESTRICTED
  recommended_action:
    - "STOP-4 · revoke token at https://github.com/settings/tokens"
    - "Trigger n8n workflow github-pat-revoke-v1"
    - "Audit org Audit Log for token usage during exposure window"
    - "Re-issue replacement via bootstrap rotation playbook"
