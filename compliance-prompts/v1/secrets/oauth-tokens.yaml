name: secrets_oauth_tokens_detector
category: secrets
severity: CRITICAL
description: |
  Detects exposed OAuth access tokens and refresh tokens for Google (ya29.*, 1//*),
  GitHub Apps (ghs_*, ghu_*), Slack (xoxb-*, xoxp-*, xoxa-*), and generic Bearer
  tokens in source materials. Distinguishes long-lived refresh tokens from
  short-lived access tokens for prioritized rotation.
pattern_examples:
  - "Authorization: Bearer ya29.<REDACTED_GOOGLE_ACCESS_TOKEN>"
  - "refresh_token=1//<REDACTED_GOOGLE_REFRESH_TOKEN>"
  - "SLACK_BOT_TOKEN=xoxb-<REDACTED_NUMERIC_BLOCK>"
  - "x-github-installation-token: ghs_<REDACTED_36_CHARS>"
  - "Cookie: oauth_token=<REDACTED_40_CHARS>"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for exposed OAuth tokens.
  Token families to detect:
  - Google OAuth access: prefix `ya29.` followed by base62/dash/underscore body
  - Google OAuth refresh: prefix `1//` followed by base64url body of ≥40 chars
  - GitHub installation/user-to-server: prefix `ghs_` or `ghu_` plus 36 chars
  - Slack: prefix `xoxb-`, `xoxp-`, `xoxa-`, `xoxr-` plus numeric blocks
  - Generic Bearer: HTTP header `Authorization: Bearer <token>` where token
    matches high-entropy (≥3.5 Shannon) base64/jwt three-segment pattern

  Treat anything wrapped in `<...>`, containing `YOUR_`, `EXAMPLE`, `REDACTED`,
  `placeholder`, or `xxx` as NEGATIVE — placeholders MUST NOT trigger detection.

  Return JSON matching expected_output_schema. Replace the matched token in
  `evidence` with `<REDACTED_TOKEN>`. NEVER echo the live token back. Classify
  token_lifetime as `short_lived_access` (≤24h) vs `long_lived_refresh` to
  prioritize rotation order.

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string                # redacted excerpt (max 80 chars · token → <REDACTED_TOKEN>)
      token_family: string           # google_oauth | github_app | slack | generic_bearer
      token_lifetime: string         # short_lived_access | long_lived_refresh | unknown
      position: string
      confidence: float
  sensitivity: L4_RESTRICTED
  recommended_action:
    - "STOP-4 immediate · revoke token at provider"
    - "Trigger n8n workflow oauth-token-revoke-v1 if Tier 1/2 provider"
    - "Audit downstream services for token reuse"
    - "Replace with short-lived service-account flow where possible"
