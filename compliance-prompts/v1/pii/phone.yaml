name: pii_phone_detector
category: pii
severity: MEDIUM
description: |
  Detects phone numbers · Polish (E.164 +48 prefix, 9-digit national) + international fallback.
  GDPR Art.4(1) personal data when natural-person; corporate switchboard = L1_INTERNAL.
pattern_examples:
  - "Tel: +48 600 123 456"
  - "Komórka: 501-234-567"
  - "Phone: (+48) 22 123 45 67 (centrala)"
  - "tel.: +1-415-555-0123"
  - "kontakt 600123456"
prompt_template: |
  You are a compliance scanner. Analyze the INPUT below for phone numbers in formats:
  - Polish mobile: `+48 \d{3}[\s-]?\d{3}[\s-]?\d{3}` or 9-digit bare starting 5/6/7/8
  - Polish landline: `+48 \d{2}[\s-]?\d{3}[\s-]?\d{2}[\s-]?\d{2}` (area code 12,22,32,42,52,58,...)
  - International E.164: `+\d{1,3}[\s-]?\d{4,14}`

  Classify each:
  - personal: bare mobile prefix 5/6/7/8 (Polish) without 'centrala'/'reception' context
  - corporate: explicitly labeled `centrala`, `reception`, `recepcja`, `biuro`

  Return JSON conforming to expected_output_schema. Mask the last 6 digits for personal (`+48 6XX-XXX-XXX` → `+48 6XX-***-***`).

  INPUT:
  ---
  {{content}}
  ---
expected_output_schema:
  detected: bool
  evidence:
    - excerpt: string
      position: string
      classification: string    # personal | corporate
      confidence: float
  sensitivity: L2_CONFIDENTIAL
  recommended_action:
    - "Mask personal phones in artifacts and Slack messages"
