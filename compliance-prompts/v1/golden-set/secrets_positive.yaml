cases:
  - id: secrets-pos-001
    prompt: secrets_api_keys_detector
    input: "ANTHROPIC_API_KEY=sk-ant-api03-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
    expected:
      detected: true
      sensitivity_floor: L4_RESTRICTED
      placeholder_required: "<REDACTED_API_KEY>"
  - id: secrets-pos-002
    prompt: secrets_oauth_tokens_detector
    input: "Authorization: Bearer ya29.a0AfH6SMBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    expected:
      detected: true
      placeholder_required: "<REDACTED_TOKEN>"
  - id: secrets-pos-003
    prompt: secrets_db_credentials_detector
    input: "DATABASE_URL=postgres://app_user:Sup3rS3cret!@db.example.com:5432/prod"
    expected:
      detected: true
      provider_hint_must_be_one_of: [self_hosted, supabase, unknown]
  - id: secrets-pos-004
    prompt: secrets_github_pat_detector
    input: "GH_PAT=github_pat_11ABCDEFGHIJKLMNO1Z0aaaa_bbbbccccddddeeeeffffgggghhhhiiiijjjjkkkkllllmmmm12"
    expected:
      detected: true
      token_class: fine_grained_pat
  - id: secrets-pos-005
    prompt: secrets_cf_tokens_detector
    input: |
      X-Auth-Email: admin@example.com
      X-Auth-Key: 1234567890abcdef1234567890abcdef12345
    expected:
      detected: true
      token_class: global_api_key
